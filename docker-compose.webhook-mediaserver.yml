services:
  cc-webhook:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    container_name: cc-webhook
    restart: unless-stopped
    environment:
      - CC_WEBHOOK_HOST=0.0.0.0
      - CC_WEBHOOK_PORT=8765
      - CC_WEBHOOK_TOKEN=${CC_WEBHOOK_TOKEN}
    volumes:
      - ./inbox:/app/inbox
    networks:
      - mediaserver_proxy_net

networks:
  mediaserver_proxy_net:
    external: true

