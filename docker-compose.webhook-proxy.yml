services:
  cc-webhook:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    container_name: cc-webhook
    restart: unless-stopped
    environment:
      - CC_WEBHOOK_HOST=0.0.0.0
      - CC_WEBHOOK_PORT=8765
      - CC_WEBHOOK_TOKEN=${CC_WEBHOOK_TOKEN}
    volumes:
      - ./inbox:/app/inbox
    networks:
      - cc_proxy

  cc-report-viewer:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    container_name: cc-report-viewer
    restart: unless-stopped
    command: ["python", "tools/report_viewer.py"]
    environment:
      - CC_REPORT_VIEWER_HOST=0.0.0.0
      - CC_REPORT_VIEWER_PORT=${CC_REPORT_VIEWER_PORT:-8786}
    ports:
      - "127.0.0.1:${CC_REPORT_VIEWER_PORT:-8786}:${CC_REPORT_VIEWER_PORT:-8786}"
    volumes:
      - ./inbox:/app/inbox
    networks:
      - cc_proxy

  cc-proxy:
    image: jc21/nginx-proxy-manager:latest
    container_name: cc-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:81:81"
    environment:
      - DB_SQLITE_FILE=/data/database.sqlite
    volumes:
      - ./proxy/npm/data:/data
      - ./proxy/npm/letsencrypt:/etc/letsencrypt
    networks:
      - cc_proxy

  cc-cloudflare-ddns:
    image: favonia/cloudflare-ddns:latest
    container_name: cc-cloudflare-ddns
    restart: unless-stopped
    environment:
      - TZ=Europe/Tallinn
      - CF_API_TOKEN=${CF_API_TOKEN}
      - DOMAINS=${CF_DDNS_DOMAINS:-cc-webhook.transcenders.online}
      - PROXIED=${CF_DDNS_PROXIED:-true}
      - IP6_PROVIDER=none

networks:
  cc_proxy:
    driver: bridge
